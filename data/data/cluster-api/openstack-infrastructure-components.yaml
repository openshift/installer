                      key (and optionally `cacert`).
                    type: string
                  namespace:
                    description: Namespace where the Secret resides.
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - secretRef
            type: object
        type: object
    served: true
    storage: true
